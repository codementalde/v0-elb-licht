<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width: 606mm;
  height: 406mm;
  background: #ffffff;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
}

.wrap {
  position: relative;
  width: 606mm;
  height: 406mm;
  background: #ffffff;
}

/* Ortak grid — arka kapı ile aynı ritim */
.safe {
  position: absolute;
  top: 30mm; left: 12mm; right: 12mm; bottom: 18mm;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Logo — panel genişliğinin %55'i */
.logo-img {
  width: 330mm;
  height: auto;
}

/* Orta içerik — flex grow ile dikey ortalanır */
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  gap: 6mm;
}

.phone-label {
  font-size: 10mm;
  font-weight: 600;
  color: #7A90A8;
  text-transform: uppercase;
  letter-spacing: 0.3em;
}

.phone-number {
  font-size: 54mm;
  font-weight: 800;
  color: #0F2952;
  letter-spacing: -0.02em;
  line-height: 1;
  white-space: nowrap;
}

/* Diller — alt sade satır */
.lang-row {
  display: flex;
  gap: 8mm;
  align-items: center;
}
.lang-item {
  font-size: 8mm;
  font-weight: 500;
  color: #4A6080;
  letter-spacing: 0.22em;
  text-transform: uppercase;
}
.lang-sep {
  color: #B8C5D6;
  font-size: 8mm;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="safe">
    <img class="logo-img" src="__LOGO_URL__" alt="ElbLicht Pflegedienst">
    <div class="content">
      <div class="phone-label">Jetzt anrufen</div>
      <div class="phone-number">040&thinsp;/&thinsp;560&thinsp;69&thinsp;787</div>
    </div>
    <div class="lang-row">
      <span class="lang-item">Deutsch</span>
      <span class="lang-sep">·</span>
      <span class="lang-item">Türkçe</span>
      <span class="lang-sep">·</span>
      <span class="lang-item">English</span>
    </div>
  </div>
</div>
</body>
</html>
